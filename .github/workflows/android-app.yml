name: Android App Build

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - '.github/workflows/android-app.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'app/**'
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 17 einrichten
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Gradle Wrapper ausführbar machen
        run: chmod +x gradlew

      - name: Android App bauen (Debug)
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Android App bauen (Release unsigned)
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Debug APK hochladen
        uses: actions/upload-artifact@v4
        with:
          name: android-app-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Release APK hochladen
        uses: actions/upload-artifact@v4
        with:
          name: android-app-release-unsigned-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
