name: Wear OS App Build

on:
  push:
    branches: [ main ]
    paths:
      - 'wear-app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - '.github/workflows/wear-app.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'wear-app/**'
  workflow_dispatch:

jobs:
  build:
    name: Build Wear OS APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 17 einrichten
        run: |
          sudo apt-get install -y openjdk-17-jdk-headless
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH
          java -version

      - name: Gradle Wrapper ausführbar machen
        run: chmod +x gradlew

      - name: Wear OS App bauen (Debug)
        run: ./gradlew :wear-app:assembleDebug --no-daemon

      - name: Wear OS App bauen (Release unsigned)
        run: ./gradlew :wear-app:assembleRelease --no-daemon

      - name: Debug APK hochladen
        uses: actions/upload-artifact@v4
        with:
          name: wear-app-debug-${{ github.run_number }}
          path: wear-app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Release APK hochladen
        uses: actions/upload-artifact@v4
        with:
          name: wear-app-release-unsigned-${{ github.run_number }}
          path: wear-app/build/outputs/apk/release/*.apk
          retention-days: 30
