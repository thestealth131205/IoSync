name: Release

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & Release APKs
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 17 einrichten
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Gradle Wrapper ausführbar machen
        run: chmod +x gradlew

      - name: Keystore einrichten
        run: |
          mkdir -p keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore/iosync-release.jks
          echo "storeFile=keystore/iosync-release.jks" > keystore.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties

      - name: Version auslesen
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Alle APKs bauen
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: ./gradlew :app:assembleRelease :wear-watchface:assembleRelease --no-daemon

      - name: APKs umbenennen
        run: |
          VERSION=${{ steps.version.outputs.version }}
          APP_APK=$(find app/build/outputs/apk/release/ -name "*.apk" | head -1)
          WF_APK=$(find wear-watchface/build/outputs/apk/release/ -name "*.apk" | head -1)
          cp "$APP_APK" iosync-v$VERSION.apk
          cp "$WF_APK" iosync_watchface-v$VERSION.apk

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: IoSync ${{ steps.version.outputs.version }}
          body: |
            ## IoSync ${{ steps.version.outputs.version }}

            ### Downloads
            | APK | Beschreibung |
            |-----|-------------|
            | `iosync-v*.apk` | Smartphone App (Android 8+) |
            | `iosync_watchface-v*.apk` | Wear OS Watchface (Wear OS 4) |

            > Signierte Release-APKs.
          files: |
            iosync-v${{ steps.version.outputs.version }}.apk
            iosync_watchface-v${{ steps.version.outputs.version }}.apk
          draft: false
          prerelease: false
          make_latest: true
