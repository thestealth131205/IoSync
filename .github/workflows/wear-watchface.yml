name: Wear OS Watchface Build

on:
  push:
    branches: [ main ]
    paths:
      - 'wear-watchface/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - '.github/workflows/wear-watchface.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'wear-watchface/**'
  workflow_dispatch:

jobs:
  build:
    name: Build Watchface APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 17 einrichten
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Gradle Wrapper ausführbar machen
        run: chmod +x gradlew

      - name: Watchface bauen (Debug)
        run: ./gradlew :wear-watchface:assembleDebug --no-daemon

      - name: Watchface bauen (Release unsigned)
        run: ./gradlew :wear-watchface:assembleRelease --no-daemon

      - name: Debug APK hochladen
        uses: actions/upload-artifact@v4
        with:
          name: watchface-debug-${{ github.run_number }}
          path: wear-watchface/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Release APK hochladen
        uses: actions/upload-artifact@v4
        with:
          name: watchface-release-unsigned-${{ github.run_number }}
          path: wear-watchface/build/outputs/apk/release/*.apk
          retention-days: 30
